<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }
        #buttons{
            height: 300px;
            width: 300px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap:10px
        }
        button{
            height: 90px;
            width: 90px;
            border: solid black 2px;
            border-radius: 10px;
            font-size: 24px;
            color:black;
            cursor: pointer;
        }
        #reset{
            height: 50px;
            width: 150px;
            border-radius: 0px;
            font-size: 16px;
        }
        #msg{
            color: black;
        }
    </style>
</head>
<body>
    <h2>TIC TAC TOE</h2>
    <div id="buttons">
        <button id="button"></button>
        <button id="button"></button>
        <button id="button"></button>

        <button id="button"></button>
        <button id="button"></button>
        <button id="button"></button>

        <button id="button"></button>
        <button id="button"></button>
        <button id="button"></button>
    </div>
    <button id="reset">Reset Game</button>
    <h2 id="msg"></h2>
    <script src="tictac.js"></script>
</body>
</html>
