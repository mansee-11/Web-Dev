<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Ball Game</title>
        <style>
            body { 
                margin:0; 
                background:black; 
                display:flex; 
                justify-content:center; 
                align-items:center; 
                height:100vh; 
            }
            canvas { 
                background:#111; 
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>

        <script>
            // --- SETUP ---
            const canvas = document.getElementById("c");
            const ctx = canvas.getContext("2d");
            canvas.width = 600;
            canvas.height = 600;

            const CX = 300; // center x
            const CY = 300; // center y
            const R  = 200; // circle radius
            const GAP = 0.55; // gap size (radians)

            let rotation = 0;
            let balls = [ newBall(CX, CY) ];

            // --- NEW BALL ---
            function newBall(x, y) {
            let angle = Math.random() * Math.PI * 2;
            let speed = 3 + Math.random() *3;
            let colors = ["red","yellow","cyan","lime","pink","orange","white"];
            return {
                x, y,
                dx: Math.cos(angle) * speed,
                dy: Math.sin(angle) * speed,
                r: 10,
                color: colors[Math.floor(Math.random() * colors.length)],
                escaped: false
            };
            }

            // --- IS BALL IN GAP? ---
            function inGap(angle) {
            let diff = angle - rotation;
            diff = ((diff % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
            if (diff > Math.PI) diff -= Math.PI*2;
            return Math.abs(diff) < GAP;
            }

            // --- DRAW ---
            function draw() {
            ctx.clearRect(0, 0, 600, 600);

            // Draw rotating circle with gap
            ctx.save();
            ctx.translate(CX, CY);
            ctx.rotate(rotation);
            ctx.beginPath();
            ctx.arc(0, 0, R, GAP, Math.PI*2 - GAP);
            ctx.strokeStyle = "yellow";
            ctx.lineWidth = 6;
            ctx.lineCap = "round";
            ctx.stroke();
            ctx.restore();

            // Draw balls
            balls.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                ctx.fillStyle = b.color;
                ctx.fill();
            });
            }

            // --- UPDATE ---
            function update() {
            rotation += 0.022;

            let newBalls = [];

            balls.forEach(b => {
                // Move ball
                b.x += b.dx;
                b.y += b.dy;

                if (!b.escaped) {
                // Check if ball hit the wall
                let dx   = b.x - CX;
                let dy   = b.y - CY;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist + b.r >= R) {
                    let angle = Math.atan2(dy, dx);

                    if (inGap(angle)) {
                    // ESCAPE through gap → spawn 2 new balls
                    b.escaped = true;
                    if (balls.length < 50) {
                        newBalls.push(newBall(CX, CY));
                        newBalls.push(newBall(CX, CY));
                    }
                    } else {
                    // BOUNCE off wall
                    let nx = dx / dist;
                    let ny = dy / dist;
                    let dot = b.dx*nx + b.dy*ny;
                    b.dx -= 2 * dot * nx;
                    b.dy -= 2 * dot * ny;
                    // Push back inside
                    let overlap = (dist + b.r) - R;
                    b.x -= nx * overlap;
                    b.y -= ny * overlap;
                    }
                }

                } else {
                // Escaped ball: delete if off screen
                if (b.x < -50 || b.x > 650 || b.y < -50 || b.y > 650) return;
                }

                newBalls.push(b);
            });

            balls = newBalls;

            // Ball vs Ball collision (just bounce, no spawn)
            for (let i = 0; i < balls.length; i++) {
                for (let j = i+1; j < balls.length; j++) {
                let a  = balls[i], b = balls[j];
                let dx = a.x - b.x,  dy = a.y - b.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < a.r + b.r && dist > 0) {
                    let nx  = dx/dist, ny = dy/dist;
                    let sep = (a.r + b.r - dist) / 2;
                    a.x += nx*sep; a.y += ny*sep;
                    b.x -= nx*sep; b.y -= ny*sep;
                    let dv  = (a.dx-b.dx)*nx + (a.dy-b.dy)*ny;
                    if (dv < 0) {
                    a.dx -= dv*nx; a.dy -= dv*ny;
                    b.dx += dv*nx; b.dy += dv*ny;
                    }
                }
                }
            }
            }

            // --- GAME LOOP ---
            function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
            }

            loop();

        </script>
    </body>
</html>
