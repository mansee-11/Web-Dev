<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
    <style>
        body{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            flex-wrap: wrap;
            /* gap: 10px; */
            background-color: gray;
            width: 100vw;
        }
        #btn{
            grid-column-start: 1;
            grid-column-end: 4;
        }
        /* button{
            width: 100vw;
            height: 40px;
            font-size: 24px;
            cursor: pointer;
        } */
        body div{
            transition: 0.3s;
        }
        body div:hover{
            transform: translateY(-10px);
        }

    </style>
</head>
<body>
    <a id="btn" href="addToCart.html"><button style="width: 100vw;
            height: 40px;
            font-size: 24px;
            cursor: pointer;">Cart</button></a>
    <script src="index.js"></script>
</body>
</html>
