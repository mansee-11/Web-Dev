<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-image: url("https://plus.unsplash.com/premium_photo-1710961232986-36cead00da3c?q=80&w=484&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
            /* background-image:url("https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D") ; */
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        input{
            height: 40px;
            width: 500px;
            margin: 10px;
            font-size: 24px;
            border-radius: 10px;
        }
        button{
            height: 40px;
            width: 300px;
            border-radius: 10px;
            border: 0px;
            background-color: dimgrey;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        #main{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 10px;
        }
        #main img{
            height: 300px;
        }
    </style>
</head>
<body>
        <input id="option" placeholder="enter movie name to search">
        <button onclick="getmovie()">Search Movie🎞️🎬🎭</button>
    <div id="main"></div>
    <script src="movie.js"></script>
</body>
</html>
