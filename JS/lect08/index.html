<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: linear-gradient(135deg,rgb(115, 227, 225),rgb(26, 45, 184));
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #main{
            margin: 50px auto;
            height: 300px;
            width: 300px;
            background-color: white;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            box-shadow: 0 0 20px rgb(1, 0, 14);
            /* justify-content: center; */
        }
        #main div{
            margin-left: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        button{
            background-color: blue;
            color: white;
            border: 0px;
            height: 30px;
            width: 150px;
            border-radius: 7px;
            margin: 0px auto;
            cursor: pointer;
        }
        h1{
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="main">
        <h1>📍Live Location Tracker</h1>
        <button onclick="getLocation()">Get My Location</button>
        <div>
            <div id="city">City: </div>
            <div id="area">Area: </div>
            <div id="state">State: </div>
            <div id="country">Country: </div>
            <div id="pincode">Pincode: </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
